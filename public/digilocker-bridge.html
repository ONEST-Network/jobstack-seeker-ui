<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiLocker Authentication Bridge</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }
        .success {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .code {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            margin: 20px 0;
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
        .loader {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">✅ DigiLocker Authentication Successful</div>
        <div id="status" class="status">
            <div class="loader"></div>
            Processing authorization code...
        </div>
        <div id="codeDisplay" class="code" style="display: none;"></div>
        <div id="instructions" style="display: none;">
            <p>Authorization code detected and sent to the application.</p>
            <p><small>You can close this window now.</small></p>
        </div>
    </div>

    <script>
        // Extract authorization code from URL
        function extractCodeFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('code');
        }

        // Send message to parent window
        function sendCodeToParent(code) {
            const redirectMessage = {
                type: 'DIGILOCKER_REDIRECT',
                code: code,
                timestamp: Date.now()
            };

            const doneMessage = {
                type: 'DIGILOCKER_DONE',
                finalUrl: window.location.href,
                timestamp: Date.now()
            };

            // Send to parent window (if opened as popup)
            if (window.opener) {
                window.opener.postMessage(redirectMessage, '*');
                window.opener.postMessage(doneMessage, '*');
            }

            // Send to parent frame (if embedded)
            if (window.parent && window.parent !== window) {
                window.parent.postMessage(redirectMessage, '*');
                window.parent.postMessage(doneMessage, '*');
            }

            // Also try sending to all possible parent origins
            const possibleOrigins = [
                'http://localhost:3000',
                'http://localhost:5173',
                'http://localhost:8080',
                'http://127.0.0.1:3000',
                'http://127.0.0.1:5173',
                'http://127.0.0.1:8080',
                'https://your-app-domain.com' // Replace with your actual domain
            ];

            possibleOrigins.forEach(origin => {
                try {
                    if (window.opener) {
                        window.opener.postMessage(redirectMessage, origin);
                        window.opener.postMessage(doneMessage, origin);
                    }
                    if (window.parent && window.parent !== window) {
                        window.parent.postMessage(redirectMessage, origin);
                        window.parent.postMessage(doneMessage, origin);
                    }
                } catch (error) {
                    // Silently handle messaging errors
                }
            });
        }

        // Main execution
        function main() {
            const code = extractCodeFromUrl();
            
            if (code) {
                // Display the code
                document.getElementById('codeDisplay').textContent = code;
                document.getElementById('codeDisplay').style.display = 'block';
                
                // Update status
                document.getElementById('status').innerHTML = 
                    '<div class="loader"></div>Sending code to application...';
                
                // Send code to parent
                sendCodeToParent(code);
                
                // Update UI after sending
                setTimeout(() => {
                    document.getElementById('status').style.display = 'none';
                    document.getElementById('instructions').style.display = 'block';
                }, 1000);
                
                // Auto-close after 3 seconds
                setTimeout(() => {
                    if (window.opener) {
                        window.close();
                    }
                }, 3000);
            } else {
                document.getElementById('status').innerHTML = 
                    '❌ No authorization code found in URL';
            }
        }

        // Run when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', main);
        } else {
            main();
        }

        // Also try to send code periodically in case the initial attempt failed
        const code = extractCodeFromUrl();
        if (code) {
            const interval = setInterval(() => {
                sendCodeToParent(code);
            }, 2000);
            
            // Stop after 30 seconds
            setTimeout(() => {
                clearInterval(interval);
            }, 30000);
        }
    </script>
</body>
</html>
