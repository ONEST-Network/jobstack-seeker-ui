name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - firebase_develop
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools
      - name: Build project
        run: pnpm run build
      - name: Deploy to Firebase
        run: firebase deploy --only hosting --project onest-jobs-firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ONEST_JOBS_FIREBASE }}
